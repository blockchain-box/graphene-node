name: validator-${NODE_ENV}

services:
  postgres-validator:
    build:
      context: ..
      dockerfile: docker/db/Dockerfile
    image: postgres-validator:local
    container_name: ${COMPOSE_PROJECT_NAME:-validator}_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_ABCI_DB_USER: ${APP_ABCI_DB_USER}
      APP_ABCI_DB_PASSWORD: ${APP_ABCI_DB_PASSWORD}
      APP_ABCI_DB_SCHEMA: ${APP_ABCI_DB_SCHEMA}
      APP_EVM_DB_USER: ${APP_EVM_DB_USER}
      APP_EVM_DB_PASSWORD: ${APP_EVM_DB_PASSWORD}
      APP_EVM_DB_SCHEMA: ${APP_EVM_DB_SCHEMA}
    volumes:
      - ../volumes/${NODE_ENV}/validator/postgresql:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped
    networks:
      - graphene-net

  mpt-db-validator:
    build:
      context: ..
      dockerfile: docker/mpt/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-validator}_mpt_db
    volumes:
      - ../volumes/${NODE_ENV}/validator/mpt/data:/app/data
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped
    networks:
      - graphene-net

  app-abci-validator:
    build:
      context: ..
      dockerfile: docker/abci/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-validator}_abci_app
    ports:
      - "0.0.0.0:3002:3002"
    environment:
      QUARKUS_PROFILE: prod
      APP_ABCI_DB_USER: ${APP_ABCI_DB_USER}
      APP_ABCI_DB_PASSWORD: ${APP_ABCI_DB_PASSWORD}
      APP_ABCI_DB_SCHEMA: ${APP_ABCI_DB_SCHEMA}
      POSTGRESSQL_DB_HOST: postgres-validator
      TENDERMINT_HOST: validator-node
      MPT_DB_HOST: mpt-db-validator
      CHAIN_ID: ${CHAIN_ID}
      COIN_SYMBOL: ${COIN_SYMBOL}
    depends_on:
      mpt-db-validator:
        condition: service_healthy
      postgres-validator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped
    networks:
      - graphene-net

  validator-node:
    build:
      context: ..
      dockerfile: docker/validator/Dockerfile
    image: tendermint-validator:local
    container_name: ${COMPOSE_PROJECT_NAME:-validator}_tendermint
    environment:
      NODE_KEY_JSON: ${NODE_KEY_JSON}
      PRIV_VALIDATOR_KEY_JSON: ${PRIV_VALIDATOR_KEY_JSON}
      P2P_NODE_NAME: ${P2P_NODE_NAME}
      P2P_SEEDS: ${P2P_SEEDS}
      P2P_PERSISTENT_PEERS: ${P2P_PERSISTENT_PEERS}
      P2P_PRIVATE_PEER_IDS: ${P2P_PRIVATE_PEER_IDS}
      P2P_UNCONDITIONAL_PEERS: ${P2P_UNCONDITIONAL_PEERS}
    command:
      - start
      - --proxy_app
      - tcp://app-abci-validator:26658
      - --moniker
      - ${P2P_NODE_NAME}
      - --p2p.seeds
      - ${P2P_SEEDS}
      - --p2p.persistent_peers
      - ${P2P_PERSISTENT_PEERS}
      - --p2p.private_peer_ids
      - ${P2P_PRIVATE_PEER_IDS}
      - --p2p.unconditional_peer_ids
      - ${P2P_UNCONDITIONAL_PEERS}
    volumes:
      - ../volumes/${NODE_ENV}/tendermint/validator/data:/tendermint/data
      - ../config/tendermint/${NODE_ENV}/genesis.json:/tendermint/config/genesis.json
    depends_on:
      app-abci-validator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - graphene-net

networks:
  graphene-net:
    external: true
